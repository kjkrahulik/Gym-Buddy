<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Find Friends</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="/js/api.js"></script>
    <script>
        function setupProfilePictures() {
            document.querySelectorAll('.user-card').forEach(card => {
                const username = card.querySelector('.user-card-info h3').textContent.trim();
                const profilePic = card.querySelector('.profile-pic');
                loadProfilePicture(username, profilePic);
            });
        }

        function loadProfilePicture(username, container) {
            fetch(`/profile/${encodeURIComponent(username)}/picture`)
                .then(res => res.ok ? res.text() : null)
                .then(base64 => {
                    if (base64 && base64.length > 0) {
                        setAvatarImage(base64, container);
                    }
                })
                .catch(err => console.error('Error loading profile picture:', err));
        }

        function setAvatarImage(base64, container) {
            const existingImg = container.querySelector('img');
            const initial = container.querySelector('.profile-pic-initial');

            if (existingImg) {
                existingImg.src = `data:image/jpeg;base64,${base64}`;
                existingImg.style.display = 'block';
            } else {
                const img = document.createElement('img');
                img.src = `data:image/jpeg;base64,${base64}`;
                img.alt = 'Profile picture';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.className = 'profile-pic-img';
                container.appendChild(img);
            }

            if (initial) {
                initial.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', setupProfilePictures);
    </script>
</head>

<body>
    <div class="container">

        <div class="top-nav">
            <a th:href="@{/profile-friend-list}" class="cta-button secondary no-decoration">Back to Friends</a>
        </div>

        <h1>Find Friends</h1>
        <p>Find other GymBuddy users and add them as friends.</p>

        <div th:if="${#lists.isEmpty(accounts)}">
            <p>No other users found.</p>
        </div>

        <div th:if="${!#lists.isEmpty(accounts)}" class="find-friends-list">
            <div th:each="result : ${accounts}" class="user-card">

                <div class="user-card-header">
                    <div class="profile-pic">
                        <img class="profile-pic-img"
                             th:src="@{/profile/{username}/picture(username=${result.account.username})}"
                             alt="Profile picture" />
                        <div class="profile-pic-initial" th:text="${result.account.username.substring(0, 1).toUpperCase()}">U</div>
                    </div>
                    <div class="user-card-info">
                        <h3 th:text="${result.account.username}">Username</h3>
                    </div>
                </div>

                <!-- Button for sending new request -->
                <button th:if="${result.requestStatus == null}"
                        class="cta-button cta-button-sm"
                        th:data-account-id="${result.account.accountID}"
                        onclick="sendFriendRequest(this.getAttribute('data-account-id'), this)">
                    Add
                </button>

                <!-- Button when request was sent by current user -->
                <button th:if="${result.requestStatus == 'sent'}"
                        class="cta-button cta-button-sm disabled"
                        disabled>
                    Request Sent
                </button>

                <!-- Button when request was received from this user -->
                <a th:if="${result.requestStatus == 'received'}"
                   th:href="@{/profile-friend-pending}"
                   class="cta-button cta-button-sm no-decoration">
                    Respond
                </a>

            </div>
        </div>

    </div>
</body>
</html>
