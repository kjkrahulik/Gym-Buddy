<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Find Friends</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="container">

        <div class="top-nav">
            <a th:href="@{/profile-friend-list}" class="cta-button secondary no-decoration">Back to Friends</a>
        </div>

        <h1>Find Friends</h1>
        <p>Find other GymBuddy users and add them as friends.</p>

        <div th:if="${#lists.isEmpty(accounts)}">
            <p>No other users found.</p>
        </div>

        <div th:if="${!#lists.isEmpty(accounts)}">
            <div th:each="account : ${accounts}" class="friend-card">

                <div>
                    <strong th:text="${account.username}">Username</strong>
                    <p th:text="${account.email}">email@example.com</p>
                </div>

                <form th:action="@{/profile-find-friends/send-request}" method="post">

                    <input type="hidden" name="receiverId" th:value="${account.accountID}">

                    <button type="submit" class="cta-button">
                        Send Friend Request
                    </button>
                </form>

            </div>
        </div>

    </div>
</body>
</html>
