<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Friends List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="/js/api.js"></script>
</head>
<!-- View all friends in the user's friend list -->
<body>
    <div class="container">

       <div class="top-nav">
            <a th:href="@{/profile}" class="cta-button secondary no-decoration">Back to Profile</a>
            <a th:href="@{/profile-find-friends}" class="cta-button secondary no-decoration">Find Friends</a>
            <a th:href="@{/profile-friend-pending}" class="cta-button secondary no-decoration">Pending Friend Requests</a>
        </div>

  



        <h1>Friends</h1>
        <p>Here are all your friends:</p>

        <div th:if="${#lists.isEmpty(friends)}">
            <p>You do not have any friends yet.</p>
        </div>

            <ul th:if="${!#lists.isEmpty(friends)}">
                <li th:each="friend : ${friends}" class="friend-card">
                    <span th:text="${friend.username}">Friend username</span>

                    <div class="friend-actions">

                        <a th:href="@{/profile-view-friend/{friendId}(friendId=${friend.accountID})}"
                        class="cta-button no-decoration">
                            View Profile
                        </a>

                        <button class="cta-button secondary"
                                onclick="removeFriend([[${friend.accountID}]], this)">
                            Remove Friend
                        </button>

                    </div>
                </li>
            </ul>
        
    </div>
</body>
</html>
