<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Pending Friend Requests</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="/js/api.js"></script>
    <script>
        function setupProfilePictures() {
            document.querySelectorAll('.friend-request-item').forEach(card => {
                const username = card.querySelector('.friend-card-info h4').textContent.trim();
                const profilePic = card.querySelector('.profile-pic');
                loadProfilePicture(username, profilePic);
            });
        }

        function loadProfilePicture(username, container) {
            fetch(`/profile/${encodeURIComponent(username)}/picture`)
                .then(res => res.ok ? res.text() : null)
                .then(base64 => {
                    if (base64 && base64.length > 0) {
                        setAvatarImage(base64, container);
                    }
                })
                .catch(err => console.error('Error loading profile picture:', err));
        }

        function setAvatarImage(base64, container) {
            const existingImg = container.querySelector('img');
            const initial = container.querySelector('.profile-pic-initial');

            if (existingImg) {
                existingImg.src = `data:image/jpeg;base64,${base64}`;
                existingImg.style.display = 'block';
            } else {
                const img = document.createElement('img');
                img.src = `data:image/jpeg;base64,${base64}`;
                img.alt = 'Profile picture';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.className = 'profile-pic-img';
                container.appendChild(img);
            }

            if (initial) {
                initial.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', setupProfilePictures);
    </script>
</head>

<body>
    <div class="container">

        <div class="top-nav">
            <a th:href="@{/profile-friend-list}" class="cta-button secondary no-decoration">Back to Friends</a>
        </div>

        <h1>Pending Friend Requests</h1>
        <p>Accept or decline incoming friend requests.</p>

        <div th:if="${#lists.isEmpty(requests)}">
            <p>You do not have any pending friend requests.</p>
        </div>

        <div th:if="${!#lists.isEmpty(requests)}" class="requests-list">
            <div th:each="request : ${requests}" class="friend-card friend-request-item">

                <div class="friend-card-content">
                    <div class="profile-pic">
                        <img class="profile-pic-img"
                             th:src="@{/profile/{username}/picture(username=${request.sender.username})}"
                             alt="Profile picture" />
                        <div class="profile-pic-initial" th:text="${request.sender.username.substring(0, 1).toUpperCase()}">S</div>
                    </div>
                    <div class="friend-card-info">
                        <h4 th:text="${request.sender.username}">Sender username</h4>
                        <p th:text="${request.sender.email}">sender@example.com</p>
                        <p class="request-status">
                            <span class="status-badge" th:text="${request.status}">PENDING</span>
                        </p>
                    </div>
                </div>

                <div class="friend-actions">
                    <button class="cta-button"
                            th:data-request-id="${request.id}"
                            onclick="acceptFriendRequest(this.getAttribute('data-request-id'), this)">
                        Accept
                    </button>

                    <button class="cta-button secondary"
                            th:data-request-id="${request.id}"
                            onclick="declineFriendRequest(this.getAttribute('data-request-id'), this)">
                        Decline
                    </button>
                </div>

            </div>
        </div>

    </div>
</body>
</html>
