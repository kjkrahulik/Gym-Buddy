<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Pending Friend Requests</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="/js/api.js"></script>
</head>

<body>
    <div class="container">

        <div class="top-nav">
            <a th:href="@{/profile-friend-list}" class="cta-button secondary no-decoration">Back to Friends</a>
        </div>

        <h1>Pending Friend Requests</h1>
        <p>Accept or decline incoming friend requests.</p>

        <div th:if="${#lists.isEmpty(requests)}">
            <p>You do not have any pending friend requests.</p>
        </div>

        <div th:if="${!#lists.isEmpty(requests)}">
            <div th:each="request : ${requests}" class="friend-card friend-request-item">

                <div>
                    <strong th:text="${request.sender.username}">Sender username</strong>
                    <p th:text="${request.sender.email}">sender@example.com</p>
                    <p>
                        Status:
                        <span th:text="${request.status}">PENDING</span>
                    </p>
                </div>

                <div class="friend-actions">
                    <button class="cta-button"
                            onclick="acceptFriendRequest([[${request.id}]], this)">
                        Accept
                    </button>

                    <button class="cta-button secondary"
                            onclick="declineFriendRequest([[${request.id}]], this)">
                        Decline
                    </button>
                </div>

            </div>
        </div>

    </div>
</body>
</html>
