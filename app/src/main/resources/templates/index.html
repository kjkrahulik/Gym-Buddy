<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Your Fitness Companion</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>💪 GymBuddy</h1>
        <p class="subtitle">Your Personal Fitness Companion</p>

        <p>Welcome to GymBuddy! Track your workouts, achieve your fitness goals, and connect with fellow fitness enthusiasts.</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Track Progress</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <div class="feature-text">Set Goals</div>
            </div>
            <div class="feature">
                <div class="feature-icon">👥</div>
                <div class="feature-text">Connect Friends</div>
            </div>
        </div>

        <div class="auth-links">
            <a th:href="@{/login}" class="cta-button no-decoration">Login</a>
            <a th:href="@{/register}" class="cta-button no-decoration">Create Account</a>
        </div>
    </div>
    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/api.js}"></script>
</body>
</html>
