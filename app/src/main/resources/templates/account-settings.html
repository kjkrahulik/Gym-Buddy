<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Account Settings</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .settings-container {
            position: relative;
            z-index: 1;
            max-width: 560px;
            width: 100%;
            background: #1e1e1e;
            padding: 40px 32px;
            border-top: 4px solid #c44b1b;
            border-bottom: 1px solid #3d3d3d;
            clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 0 100%);
            animation: rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .settings-container::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 0; height: 0;
            border-style: solid;
            border-width: 0 28px 28px 0;
            border-color: transparent #2a2a2a transparent transparent;
        }

        .settings-container h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            text-align: center;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
            line-height: 1;
            text-transform: uppercase;
            color: #e9e5dc;
            font-size: clamp(28px, 5vw, 40px);
        }

        .settings-container h2::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: #c44b1b;
            margin: 12px auto 0;
        }

        .section {
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid #3d3d3d;
        }

        .section-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #c44b1b;
            margin: 0 0 20px 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin: 0 0 8px;
            color: #8a867e;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #3d3d3d;
            border-radius: 0;
            background-color: #2a2a2a;
            color: #e9e5dc;
            font-size: 14px;
            font-family: 'Barlow', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #c44b1b;
            box-shadow: 0 0 0 2px rgba(196, 75, 27, 0.25);
        }

        .form-group textarea {
            min-height: 80px;
        }


        .btn-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Feed back messages - hidden until JS shows them */
        .msg {
            display: none;
            font-family: 'Barlow', sans-serif;
            font-size: 13px;
            padding: 8px 12px;
        }

        .msg.success {
            color: #51cf66;
            background: rgba(81, 207, 102, 0.1);
            border-left: 3px solid #51cf66;
        }

        .msg.error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border-left: 3px solid #ff6b6b;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #c44b1b;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            font-weight: bold;
            font-family: 'Barlow Condensed', sans-serif;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .picture-row {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .picture-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <h2>Account Settings</h2>

        <!-- Username stored for JS API calls -->
        <span id="current-username" th:text="${username}" class="hidden"></span>

        <!-- ── Profile Info ─────────────────────── -->
        <div class="section">
            <p class="section-title">Profile Info</p>
            <div class="form-group">
                <label for="username-input">Username</label>
                <input type="text" id="username-input" th:value="${username}">
            </div>
            <div class="form-group">
                <label for="email-input">Email</label>
                <input type="email" id="email-input" th:value="${email}">
            </div>
            <div class="btn-row">
                <button class="cta-button" onclick="saveProfileInfo()">Save Changes</button>
                <span id="profile-msg" class="msg"></span>
            </div>
        </div>

        <!-- ── Bio ─────────────────────────────── -->
        <div class="section">
            <p class="section-title">Bio</p>
            <div class="form-group">
                <label for="bio-input">About You</label>
                <textarea id="bio-input" placeholder="Tell the gym community about yourself..." th:text="${bio}"></textarea>
            </div>
            <div class="btn-row">
                <button class="cta-button" onclick="saveBio()">Save Bio</button>
                <span id="bio-msg" class="msg"></span>
            </div>
        </div>

        <!-- ── Profile Picture ──────────────────── -->
        <div class="section">
            <p class="section-title">Profile Picture</p>
            <div class="picture-row">
                <div class="avatar" id="avatar-preview">
                    <!-- Replaced with <img> if a picture exists -->
                    <span id="avatar-initials" th:text="${#strings.toUpperCase(#strings.substring(username, 0, 1))}"></span>
                </div>
                <div class="picture-actions">
                    <button class="cta-button" onclick="document.getElementById('picture-file').click()">Upload New Photo</button>
                    <button class="cta-button danger" onclick="deletePicture()">Remove Photo</button>
                    <input type="file" id="picture-file" accept="image/*" class="hidden file-input-hidden" onchange="uploadPicture(this)">
                </div>
            </div>
            <span id="picture-msg" class="msg"></span>
        </div>

        <!-- ── Change Password ──────────────────── -->
        <div class="section">
            <p class="section-title">Change Password</p>
            <p class="text-secondary font-sm mb-lg">
                A verification code will be sent to your registered email address.
            </p>
            <div class="btn-row mb-lg">
                <button class="cta-button secondary" onclick="sendCode()">Send Verification Code</button>
                <span id="code-sent-msg" class="msg"></span>
            </div>
            <div class="form-group">
                <label for="reset-code">Verification Code</label>
                <input type="text" id="reset-code" placeholder="Enter the code from your email" autocomplete="one-time-code">
            </div>
            <div class="form-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm New Password</label>
                <input type="password" id="confirm-password" autocomplete="new-password">
            </div>
            <div class="btn-row">
                <button class="cta-button" onclick="changePassword()">Update Password</button>
                <span id="password-msg" class="msg"></span>
            </div>
        </div>

        <!-- ── Navigation ───────────────────────── -->
        <div class="nav-footer">
            <a th:href="@{/profile}" class="cta-button secondary">Back to Profile</a>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit" class="cta-button">Logout</button>
            </form>
        </div>
    </div>

    <script>
        const username = document.getElementById('current-username').textContent.trim();

        // Load profile picture on page load
        window.addEventListener('DOMContentLoaded', loadProfilePicture);

        function showMsg(id, type, text) {
            const el = document.getElementById(id);
            el.className = 'msg ' + type;
            el.textContent = text;
            el.style.display = 'inline-block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        async function saveProfileInfo() {
            const newUsername = document.getElementById('username-input').value.trim();
            const email = document.getElementById('email-input').value.trim();

            const params = new URLSearchParams();
            if (email) params.set('email', email);
            if (newUsername && newUsername !== username) params.set('newUsername', newUsername);

            try {
                const res = await fetch(`/accounts/me/${encodeURIComponent(username)}?${params}`, { method: 'PUT' });
                if (res.ok) {
                    showMsg('profile-msg', 'success', 'Changes saved.');
                } else {
                    const text = await res.text();
                    showMsg('profile-msg', 'error', text || 'Failed to save.');
                }
            } catch {
                showMsg('profile-msg', 'error', 'Network error.');
            }
        }

        async function saveBio() {
            const bio = document.getElementById('bio-input').value.trim();
            try {
                const res = await fetch(
                    `/profile/${encodeURIComponent(username)}/bio?bio=${encodeURIComponent(bio)}`,
                    { method: 'PUT' }
                );
                if (res.ok) {
                    showMsg('bio-msg', 'success', 'Bio updated.');
                } else {
                    showMsg('bio-msg', 'error', 'Failed to update bio.');
                }
            } catch {
                showMsg('bio-msg', 'error', 'Network error.');
            }
        }

        async function loadProfilePicture() {
            try {
                const res = await fetch(`/profile/${encodeURIComponent(username)}/picture`);
                if (res.ok) {
                    const base64 = await res.text();
                    if (base64 && base64.length > 0) setAvatarImage(base64);
                }
            } catch { /* keep initials */ }
        }

        function setAvatarImage(base64) {
            const preview = document.getElementById('avatar-preview');
            const img = document.createElement('img');
            img.src = `data:image/jpeg;base64,${base64}`;
            img.alt = 'Profile picture';
            preview.innerHTML = '';
            preview.appendChild(img);
        }

        function restoreInitials() {
            const preview = document.getElementById('avatar-preview');
            preview.innerHTML = `<span>${username.charAt(0).toUpperCase()}</span>`;
        }

        async function uploadPicture(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];

            if (file.size > 5 * 1024 * 1024) {
                showMsg('picture-msg', 'error', 'File too large — max 5 MB.');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(
                    `/profile/${encodeURIComponent(username)}/picture`,
                    { method: 'POST', body: formData }
                );
                if (res.ok) {
                    // Show the uploaded image locally without a second round-trip
                    const reader = new FileReader();
                    reader.onload = e => setAvatarImage(e.target.result.split(',')[1]);
                    reader.readAsDataURL(file);
                    showMsg('picture-msg', 'success', 'Photo updated.');
                } else {
                    showMsg('picture-msg', 'error', 'Failed to upload photo.');
                }
            } catch {
                showMsg('picture-msg', 'error', 'Network error.');
            }
        }

        async function deletePicture() {
            try {
                const res = await fetch(
                    `/profile/${encodeURIComponent(username)}/picture`,
                    { method: 'DELETE' }
                );
                if (res.ok) {
                    restoreInitials();
                    showMsg('picture-msg', 'success', 'Photo removed.');
                } else {
                    showMsg('picture-msg', 'error', 'Failed to remove photo.');
                }
            } catch {
                showMsg('picture-msg', 'error', 'Network error.');
            }
        }

        async function sendCode() {
            try {
                const res = await fetch(
                    `/accounts/me/${encodeURIComponent(username)}/password/request-reset`,
                    { method: 'POST' }
                );
                if (res.ok) {
                    showMsg('code-sent-msg', 'success', 'Code sent — check your email.');
                } else {
                    const text = await res.text();
                    showMsg('code-sent-msg', 'error', text || 'Failed to send code.');
                }
            } catch {
                showMsg('code-sent-msg', 'error', 'Network error.');
            }
        }

        async function changePassword() {
            const code = document.getElementById('reset-code').value.trim();
            const next = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (!code || !next || !confirm) {
                showMsg('password-msg', 'error', 'All fields are required.');
                return;
            }
            if (next !== confirm) {
                showMsg('password-msg', 'error', 'Passwords do not match.');
                return;
            }
            if (next.length < 6) {
                showMsg('password-msg', 'error', 'Password must be at least 6 characters.');
                return;
            }

            try {
                const params = new URLSearchParams({ code, newPassword: next });
                const res = await fetch(
                    `/accounts/me/${encodeURIComponent(username)}/password/reset?${params}`,
                    { method: 'PUT' }
                );
                if (res.ok) {
                    showMsg('password-msg', 'success', 'Password updated.');
                    document.getElementById('reset-code').value = '';
                    document.getElementById('new-password').value = '';
                    document.getElementById('confirm-password').value = '';
                } else {
                    const text = await res.text();
                    showMsg('password-msg', 'error', text || 'Failed to update password.');
                }
            } catch {
                showMsg('password-msg', 'error', 'Network error.');
            }
        }
    </script>
</body>
</html>
