<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Create Workout Template</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            width: 92vw;
            margin: 2rem auto;
            padding: 52px 48px 48px;
            background: var(--concrete);
            border-top: 4px solid var(--rust);
            border-bottom: 1px solid var(--steel);
            clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 0 100%);
            animation: rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .container::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 0; height: 0;
            border-style: solid;
            border-width: 0 28px 28px 0;
            border-color: transparent var(--smoke) transparent transparent;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            color: var(--chalk);
            font-size: 0;
        }

        h1::before {
            content: 'CREATE TEMPLATE';
            font-size: clamp(28px, 6vw, 46px);
            color: var(--chalk);
        }

        h1::after {
            content: none;
        }

        .subtitle {
            color: var(--chalk-dim);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--chalk);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--iron);
            border: 1px solid var(--steel);
            border-radius: 6px;
            color: var(--chalk);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--rust);
        }

        .form-control::placeholder {
            color: var(--chalk-dim);
        }

        .exercise-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--steel);
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .exercise-header h3 {
            color: var(--chalk);
            margin: 0;
        }

        .exercise-list {
            margin-bottom: 1.5rem;
        }

        .exercise-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background-color: var(--iron);
            border: 1px solid var(--steel);
            border-radius: 6px;
            margin-bottom: 0.75rem;
        }

        .exercise-item:last-child {
            margin-bottom: 0;
        }

        .exercise-info {
            flex: 1;
        }

        .exercise-name {
            color: var(--chalk);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .exercise-muscle {
            color: var(--chalk-dim);
            font-size: 0.9rem;
        }

        .exercise-remove {
            background: none;
            border: none;
            color: var(--rust);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .exercise-remove:hover {
            background-color: rgba(196, 75, 27, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--chalk-dim);
        }

        .select-exercise {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .select-exercise select {
            flex: 1;
            padding: 0.75rem 1rem;
            background-color: var(--iron);
            border: 1px solid var(--steel);
            border-radius: 6px;
            color: var(--chalk);
            font-family: inherit;
            font-size: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            background-color: var(--rust);
            color: white;
            border: none;
            border-radius: 6px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--rust-hot);
        }

        .btn-secondary {
            background-color: var(--steel);
        }

        .btn-secondary:hover {
            background-color: var(--chalk-dim);
        }

        .btn-danger {
            background-color: #d32f2f;
        }

        .btn-danger:hover {
            background-color: #c62828;
        }

        .btn-block {
            width: 100%;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .message {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }

        .message-success {
            background-color: rgba(76, 175, 80, 0.1);
            border: 1px solid #4caf50;
            color: #4caf50;
        }

        .message-error {
            background-color: rgba(211, 47, 47, 0.1);
            border: 1px solid #d32f2f;
            color: #d32f2f;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--chalk-dim);
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Workout Template</h1>
        <p class="subtitle">Create a custom workout template by adding exercises</p>

        <div id="message" class="message"></div>
        <div id="loading" class="loading">Loading...</div>

        <form id="workoutTemplateForm">
            <div class="form-group">
                <label for="workoutName">Workout Template Name</label>
                <input type="text" id="workoutName" class="form-control"
                       placeholder="e.g., Upper Body Strength, Leg Day, Full Body Circuit" required>
            </div>

            <div class="form-group">
                <label for="workoutDescription">Description (Optional)</label>
                <textarea id="workoutDescription" class="form-control" rows="3"
                          placeholder="Describe this workout template..."></textarea>
            </div>

            <div class="exercise-section">
                <div class="exercise-header">
                    <h3>Exercises</h3>
                    <span id="exerciseCount" class="exercise-count">0 exercises</span>
                </div>

                <div id="exerciseList" class="exercise-list">
                    <div class="empty-state">No exercises added yet. Add some exercises to build your template.</div>
                </div>

                <div class="select-exercise">
                    <select id="exerciseSelect" class="form-control">
                        <option value="">Select an exercise...</option>
                        <!-- Exercises will be populated by JavaScript -->
                    </select>
                    <button type="button" id="addExerciseBtn" class="btn">Add Exercise</button>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" id="saveTemplateBtn" class="btn btn-block">Save Workout Template</button>
            </div>
        </form>

        <div class="page-actions">
            <a th:href="@{/profile}" class="btn btn-secondary">Back to Profile</a>
        </div>
    </div>

    <script>
        let selectedExercises = [];
        let allExercises = [];

        // Load exercises from the API
        async function loadExercises() {
            try {
                const response = await fetch('/exercises');
                if (!response.ok) {
                    console.error('Failed to load exercises:', response.status, response.statusText);
                    throw new Error('Failed to load exercises');
                }
                allExercises = await response.json();
                console.log('Loaded', allExercises.length, 'exercises');

                const exerciseSelect = document.getElementById('exerciseSelect');
                exerciseSelect.innerHTML = '<option value="">Select an exercise...</option>';

                allExercises.forEach(exercise => {
                    const option = document.createElement('option');
                    option.value = exercise.exerciseID;
                    option.textContent = `${exercise.exerciseName} (${exercise.muscleGroup})`;
                    option.dataset.exercise = JSON.stringify(exercise);
                    exerciseSelect.appendChild(option);
                });

                return true;
            } catch (error) {
                console.error('Error in loadExercises:', error);
                showMessage('Error loading exercises: ' + error.message, 'error');
                return false;
            }
        }

        // Update exercise list display
        function updateExerciseList() {
            const exerciseList = document.getElementById('exerciseList');
            const exerciseCount = document.getElementById('exerciseCount');

            exerciseCount.textContent = `${selectedExercises.length} exercises`;

            if (selectedExercises.length === 0) {
                exerciseList.innerHTML = '<div class="empty-state">No exercises added yet. Add some exercises to build your template.</div>';
                return;
            }

            exerciseList.innerHTML = '';
            selectedExercises.forEach((exercise, index) => {
                const exerciseItem = document.createElement('div');
                exerciseItem.className = 'exercise-item';
                exerciseItem.innerHTML = `
                    <div class="exercise-info">
                        <div class="exercise-name">${exercise.exerciseName}</div>
                        <div class="exercise-muscle">${exercise.muscleGroup}</div>
                    </div>
                    <button type="button" class="exercise-remove" data-index="${index}">×</button>
                `;
                exerciseList.appendChild(exerciseItem);
            });

            // Add event listeners to remove buttons
            document.querySelectorAll('.exercise-remove').forEach(button => {
                button.addEventListener('click', function() {
                    const index = parseInt(this.dataset.index);
                    removeExercise(index);
                });
            });
        }

        // Add exercise to the list
        function addExercise() {
            const exerciseSelect = document.getElementById('exerciseSelect');
            const selectedOption = exerciseSelect.selectedOptions[0];

            if (!selectedOption || !selectedOption.value) {
                showMessage('Please select an exercise to add', 'error');
                return;
            }

            const exercise = JSON.parse(selectedOption.dataset.exercise);

            // Check if exercise is already in the list
            if (selectedExercises.some(e => e.exerciseID === exercise.exerciseID)) {
                showMessage('This exercise is already in the template', 'error');
                return;
            }

            selectedExercises.push(exercise);
            exerciseSelect.selectedIndex = 0;
            updateExerciseList();
        }

        // Remove exercise from the list
        function removeExercise(index) {
            selectedExercises.splice(index, 1);
            updateExerciseList();
        }

        // Save workout template
        async function saveWorkoutTemplate(e) {
            e.preventDefault();

            const workoutName = document.getElementById('workoutName').value.trim();
            const workoutDescription = document.getElementById('workoutDescription').value.trim();

            if (!workoutName) {
                showMessage('Please enter a name for the workout template', 'error');
                return;
            }

            if (selectedExercises.length === 0) {
                showMessage('Please add at least one exercise to the template', 'error');
                return;
            }

            const saveBtn = document.getElementById('saveTemplateBtn');
            const loading = document.getElementById('loading');

            saveBtn.disabled = true;
            loading.style.display = 'block';

            try {
                // First, create the workout template
                const templateResponse = await fetch('/api/workout-templates', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        workoutName: workoutName,
                        workoutDescription: workoutDescription
                    })
                });

                const templateData = await templateResponse.json();
                if (!templateResponse.ok) {
                    throw new Error(templateData.error || templateData.message || templateData);
                }

                const templateId = templateData.workoutTemplateID;

                // Then, add each exercise to the template
                for (let i = 0; i < selectedExercises.length; i++) {
                    const exercise = selectedExercises[i];
                    const exerciseResponse = await fetch(`/api/workout-templates/${templateId}/exercises`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            exerciseId: exercise.exerciseID,
                            listOrder: i + 1
                        })
                    });

                    if (!exerciseResponse.ok) {
                        const errorData = await exerciseResponse.json();
                        throw new Error(`Failed to add exercise ${exercise.exerciseName}: ${errorData.error || errorData.message || errorData}`);
                    }
                }

                showMessage('Workout template saved successfully!', 'success');

                // Clear form
                document.getElementById('workoutTemplateForm').reset();
                selectedExercises = [];
                updateExerciseList();

                // Redirect to profile after a delay
                setTimeout(() => {
                    window.location.href = window.location.origin + '/profile';
                }, 2000);

            } catch (error) {
                console.error('Error saving workout template:', error);
                showMessage('Error saving workout template: ' + error.message, 'error');
            } finally {
                saveBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        // Show message to user
        function showMessage(message, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message message-${type}`;
            messageDiv.style.display = 'block';

            // Auto-hide success messages
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', async function() {
            // Load exercises
            await loadExercises();

            // Set up event listeners
            document.getElementById('addExerciseBtn').addEventListener('click', addExercise);
            document.getElementById('workoutTemplateForm').addEventListener('submit', saveWorkoutTemplate);

            // Allow Enter key in exercise select to add exercise
            document.getElementById('exerciseSelect').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addExercise();
                }
            });
        });
    </script>
</body>
</html>
