<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Create Workout Template</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            align-items: flex-start;
            padding: 0;
        }

        .workout-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: var(--concrete);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--steel);
            background: var(--iron);
        }

        .session-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--chalk);
        }

        .session-subtitle {
            font-size: 12px;
            color: var(--chalk-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .main-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .template-info {
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--chalk);
            font-weight: 600;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--steel);
            background: var(--smoke);
            color: var(--chalk);
            font-size: 14px;
            font-family: 'Barlow', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--rust);
        }

        .form-control::placeholder {
            color: var(--chalk-dim);
        }

        textarea.form-control {
            font-family: 'Barlow', sans-serif;
            resize: vertical;
            min-height: 80px;
        }

        .search-section {
            position: relative;
            margin-bottom: 20px;
            margin-top: 24px;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            gap: 8px;
        }

        .search-bar {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--steel);
            border-radius: 0;
            background: var(--smoke);
            color: var(--chalk);
            font-size: 14px;
        }

        .search-bar::placeholder {
            color: var(--chalk-dim);
        }

        .search-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--smoke);
            border: 1px solid var(--steel);
            border-top: none;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .search-dropdown.active {
            display: block;
        }

        .search-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--steel);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .search-item:last-child {
            border-bottom: none;
        }

        .search-item:hover {
            background: var(--iron);
        }

        .search-item-name {
            color: var(--chalk);
            font-weight: 500;
        }

        .search-item-muscle {
            color: var(--chalk-dim);
            font-size: 12px;
        }

        .add-exercise-btn {
            padding: 12px 20px;
            background: var(--rust);
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .add-exercise-btn:hover {
            background: var(--rust-hot);
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 8px 16px;
            border: 1px solid var(--steel);
            background: transparent;
            color: var(--chalk-dim);
            cursor: pointer;
            font-size: 12px;
            font-family: 'Barlow', sans-serif;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: var(--chalk-dim);
            color: var(--chalk);
        }

        .chip.active {
            background: var(--rust);
            border-color: var(--rust);
            color: white;
        }

        .exercises-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 32px;
        }

        .exercise-block {
            background: var(--smoke);
            border: 1px solid var(--steel);
        }

        .exercise-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--smoke);
            border-bottom: 1px solid var(--steel);
        }

        .exercise-info {
            display: flex;
            gap: 12px;
            align-items: center;
            flex: 1;
        }

        .exercise-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--chalk);
        }

        .exercise-muscle {
            font-size: 12px;
            color: var(--chalk-dim);
        }


        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--chalk-dim);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-top: 1px solid var(--steel);
            background: var(--iron);
            margin-top: auto;
        }

        .cta-button {
            padding: 12px 24px;
            background: var(--rust);
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .cta-button:hover {
            background: var(--rust-hot);
        }

        .cta-button.secondary {
            background: transparent;
            color: var(--chalk-dim);
            border: 1px solid var(--steel);
        }

        .cta-button.secondary:hover {
            background: var(--iron);
            border-color: var(--chalk-dim);
            color: var(--chalk);
        }

        .message {
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 0;
            display: none;
            font-size: 14px;
        }

        .message-success {
            background-color: rgba(76, 175, 80, 0.1);
            border: 1px solid #4caf50;
            color: #4caf50;
        }

        .message-error {
            background-color: rgba(211, 47, 47, 0.1);
            border: 1px solid #d32f2f;
            color: #d32f2f;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--chalk-dim);
            padding: 16px;
        }
    </style>
</head>
<body>
    <div class="workout-container">
        <!-- Header -->
        <div class="session-header">
            <div>
                <div class="session-name" id="pageTitle">Create Template</div>
                <div class="session-subtitle" id="pageSubtitle">Build your workout</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div id="message" class="message"></div>
            <div id="loading" class="loading">Loading...</div>

            <form id="workoutTemplateForm">
                <div class="template-info">
                    <div class="form-group">
                        <label for="listName">Template Name</label>
                        <input type="text" id="listName" class="form-control"
                               placeholder="e.g., Upper Body Strength, Leg Day" required>
                    </div>

                    <div class="form-group">
                        <label for="notes">Description (Optional)</label>
                        <textarea id="notes" class="form-control"
                                  placeholder="Describe this workout template..."></textarea>
                    </div>
                </div>

                <!-- Search for Exercises -->
                <div class="search-section">
                    <div class="search-wrapper">
                        <input type="text" class="search-bar" id="exerciseSearch" placeholder="Search and click to add exercises...">
                        <div class="search-dropdown" id="searchDropdown"></div>
                    </div>
                </div>

                <!-- Filter Chips -->
                <div class="filter-chips" id="filterChips">
                    <button type="button" class="chip active" data-filter="all">All</button>
                </div>

                <!-- Exercises List -->
                <div class="exercises-list" id="exercisesList">
                    <div class="empty-state">
                        <p>No exercises added yet. Search or select a muscle group to add exercises.</p>
                    </div>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="/workout-templates" class="cta-button secondary" id="cancelBtn">Cancel</a>
            <button class="cta-button" id="saveTemplateBtn">Save Template</button>
        </div>
    </div>

    <script>
        let templateData = {
            exercises: [],
            allExercises: [],
            currentFilter: 'all'
        };

        const editTemplateId = new URLSearchParams(window.location.search).get('templateId');

        // Load exercises from the API
        async function loadExercises() {
            try {
                const response = await fetch('/exercises');
                if (!response.ok) {
                    throw new Error('Failed to load exercises');
                }
                templateData.allExercises = await response.json();
                generateFilterChips();
            } catch (error) {
                console.error('Failed to load exercises:', error);
                showMessage('Error loading exercises: ' + error.message, 'error');
            }
        }

        function generateFilterChips() {
            const filterChips = document.getElementById('filterChips');

            // Extract unique muscle groups
            const muscleGroups = [...new Set(templateData.allExercises.map(e => e.muscleGroup))].sort();

            // Add buttons for each muscle group
            muscleGroups.forEach(group => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'chip';
                button.dataset.filter = group;
                button.textContent = group;
                filterChips.appendChild(button);
            });

            // Attach event listeners to all chips
            attachChipListeners();
        }

        function attachChipListeners() {
            document.querySelectorAll('.chip').forEach(chip => {
                chip.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                    e.target.classList.add('active');
                    templateData.currentFilter = e.target.dataset.filter;
                    renderExercises();
                });
            });
        }

        // Search functionality
        const searchInput = document.getElementById('exerciseSearch');
        const searchDropdown = document.getElementById('searchDropdown');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();

            if (!query) {
                searchDropdown.classList.remove('active');
                return;
            }

            const filtered = templateData.allExercises.filter(ex =>
                ex.exerciseName.toLowerCase().includes(query) ||
                ex.muscleGroup.toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                searchDropdown.innerHTML = '<div class="search-item" style="color: var(--chalk-dim);">No exercises found</div>';
            } else {
                searchDropdown.innerHTML = filtered.map(exercise => `
                    <div class="search-item" onclick="selectExerciseFromSearch(${exercise.exerciseID})">
                        <div>
                            <div class="search-item-name">${exercise.exerciseName}</div>
                            <div class="search-item-muscle">${exercise.muscleGroup}</div>
                        </div>
                    </div>
                `).join('');
            }

            searchDropdown.classList.add('active');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (e.target !== searchInput && !searchInput.contains(e.target)) {
                searchDropdown.classList.remove('active');
            }
        });

        function selectExerciseFromSearch(exerciseID) {
            const exercise = templateData.allExercises.find(e => e.exerciseID === exerciseID);
            if (exercise && !templateData.exercises.some(e => e.exerciseID === exerciseID)) {
                templateData.exercises.push(exercise);
                searchInput.value = '';
                searchDropdown.classList.remove('active');
                renderExercises();
            } else if (templateData.exercises.some(e => e.exerciseID === exerciseID)) {
                showMessage('This exercise is already added', 'error');
            }
        }

        function renderExercises() {
            const list = document.getElementById('exercisesList');
            const filtered = getFilteredExercises();

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>No exercises added yet. Search or select a muscle group to add exercises.</p></div>';
                return;
            }

            list.innerHTML = filtered.map((exercise, idx) => `
                <div class="exercise-block" data-exercise-id="${exercise.exerciseID}">
                    <div class="exercise-header">
                        <div class="exercise-info">
                            <div>
                                <div class="exercise-name">${exercise.exerciseName}</div>
                                <div class="exercise-muscle">${exercise.muscleGroup}</div>
                            </div>
                        </div>
                        <button type="button" class="cta-button cta-button-sm danger" onclick="removeExercise(${exercise.exerciseID})">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        function getFilteredExercises() {
            if (templateData.currentFilter === 'all') {
                return templateData.exercises;
            }
            return templateData.exercises.filter(e => e.muscleGroup === templateData.currentFilter);
        }

        function removeExercise(exerciseID) {
            templateData.exercises = templateData.exercises.filter(e => e.exerciseID !== exerciseID);
            renderExercises();
        }

        // Save workout template (create or update)
        async function saveWorkoutTemplate() {
            const listName = document.getElementById('listName').value.trim();
            const notes = document.getElementById('notes').value.trim();

            if (!listName) {
                showMessage('Please enter a name for the workout template', 'error');
                return;
            }

            if (templateData.exercises.length === 0) {
                showMessage('Please add at least one exercise to the template', 'error');
                return;
            }

            const saveBtn = document.getElementById('saveTemplateBtn');
            const loading = document.getElementById('loading');

            saveBtn.disabled = true;
            loading.style.display = 'block';

            try {
                let templateId;

                if (editTemplateId) {
                    // Update existing template name/notes
                    const updateResponse = await fetch(`/api/workout-templates/${editTemplateId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ listName, notes })
                    });
                    const updateData = await updateResponse.json();
                    if (!updateResponse.ok) {
                        throw new Error(updateData.error || updateData.message || 'Failed to update template');
                    }

                    // Clear all existing exercises
                    const clearResponse = await fetch(`/api/workout-templates/${editTemplateId}/exercises`, {
                        method: 'DELETE'
                    });
                    if (!clearResponse.ok) {
                        const clearData = await clearResponse.json();
                        throw new Error(clearData.error || 'Failed to clear exercises');
                    }

                    templateId = editTemplateId;
                } else {
                    // Create new template
                    const createResponse = await fetch('/api/workout-templates', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ listName, notes })
                    });
                    const createData = await createResponse.json();
                    if (!createResponse.ok) {
                        throw new Error(createData.error || createData.message || 'Failed to create template');
                    }
                    templateId = createData.listID;
                }

                // Add each exercise to the template
                for (let i = 0; i < templateData.exercises.length; i++) {
                    const exercise = templateData.exercises[i];
                    const exerciseResponse = await fetch(`/api/workout-templates/${templateId}/exercises`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            exerciseId: exercise.exerciseID,
                            listOrder: i + 1
                        })
                    });

                    if (!exerciseResponse.ok) {
                        const errorData = await exerciseResponse.json();
                        throw new Error(`Failed to add exercise ${exercise.exerciseName}: ${errorData.error || errorData.message || 'Unknown error'}`);
                    }
                }

                showMessage(editTemplateId ? 'Template updated successfully!' : 'Workout template saved successfully!', 'success');

                setTimeout(() => {
                    window.location.href = '/workout-templates';
                }, 1500);

            } catch (error) {
                console.error('Error saving workout template:', error);
                showMessage('Error saving workout template: ' + error.message, 'error');
            } finally {
                saveBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        // Show message to user
        function showMessage(message, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = message;
            messageDiv.className = `message message-${type}`;
            messageDiv.style.display = 'block';

            // Auto-hide success messages
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        }

        // Load an existing template into the form for editing
        async function loadTemplateForEdit(templateId) {
            try {
                const response = await fetch(`/api/workout-templates/${templateId}`);
                if (!response.ok) throw new Error('Template not found');
                const template = await response.json();

                document.getElementById('listName').value = template.listName || '';
                document.getElementById('notes').value = template.notes || '';
                document.getElementById('pageTitle').textContent = 'Edit Template';
                document.getElementById('pageSubtitle').textContent = 'Modify your workout';
                document.getElementById('saveTemplateBtn').textContent = 'Update Template';

                // Populate exercises from the template's exercises map
                const exercisesMap = template.exercises || {};
                const ordered = Object.keys(exercisesMap)
                    .sort((a, b) => parseInt(a) - parseInt(b))
                    .map(key => exercisesMap[key]);

                templateData.exercises = ordered;
                renderExercises();
            } catch (error) {
                console.error('Failed to load template for editing:', error);
                showMessage('Failed to load template data.', 'error');
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', async function() {
            // Load exercises
            await loadExercises();

            // If editing, pre-fill form with existing template data
            if (editTemplateId) {
                await loadTemplateForEdit(editTemplateId);
            }

            // Set up event listeners
            document.getElementById('saveTemplateBtn').addEventListener('click', saveWorkoutTemplate);

            // Allow Enter key in search to close dropdown
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
