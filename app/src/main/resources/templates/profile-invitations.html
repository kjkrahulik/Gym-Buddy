<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Workout Invitations</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <div class="container">

        <div class="top-nav">
            <a th:href="@{/profile}" class="cta-button secondary no-decoration">Back to Profile</a>
        </div>

        <h1>Workout Invitations</h1>
        <p>Here are your pending workout invitations:</p>

        <div th:if="${#lists.isEmpty(invitations)}">
            <p>You do not have any workout invitations yet.</p>
        </div>

        <div th:if="${!#lists.isEmpty(invitations)}">
            <div th:each="invitation : ${invitations}" class="friend-card">

                <div>
                    <p>
                        From:
                        <strong th:text="${invitation.sender.username}">Sender username</strong>
                    </p>

                    <p>
                        Status:
                        <span th:text="${invitation.status}">PENDING</span>
                    </p>

                    <p th:if="${invitation.workoutSession != null}">
                        Workout:
                        <span th:text="${invitation.workoutSession.sessionName}">Workout name</span>
                    </p>
                </div>

            </div>
        </div>

    </div>
</body>
</html>
