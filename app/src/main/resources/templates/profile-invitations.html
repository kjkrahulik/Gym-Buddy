<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Workout Invitations</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        function setupProfilePictures() {
            document.querySelectorAll('.invitation-card').forEach(card => {
                const username = card.querySelector('.invitation-sender').textContent.trim();
                const profilePic = card.querySelector('.profile-pic');
                if (profilePic) {
                    loadProfilePicture(username, profilePic);
                }
            });
        }

        function loadProfilePicture(username, container) {
            fetch(`/profile/${encodeURIComponent(username)}/picture`)
                .then(res => res.ok ? res.text() : null)
                .then(base64 => {
                    if (base64 && base64.length > 0) {
                        setAvatarImage(base64, container);
                    }
                })
                .catch(err => console.error('Error loading profile picture:', err));
        }

        function setAvatarImage(base64, container) {
            const existingImg = container.querySelector('img');
            const initial = container.querySelector('.profile-pic-initial');

            if (existingImg) {
                existingImg.src = `data:image/jpeg;base64,${base64}`;
                existingImg.style.display = 'block';
            } else {
                const img = document.createElement('img');
                img.src = `data:image/jpeg;base64,${base64}`;
                img.alt = 'Profile picture';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.className = 'profile-pic-img';
                container.appendChild(img);
            }

            if (initial) {
                initial.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', setupProfilePictures);
    </script>
</head>

<body>
    <div class="container">

        <div class="top-nav">
            <a th:href="@{/profile}" class="cta-button secondary no-decoration">Back to Profile</a>
        </div>

        <h1>Workout Invitations</h1>
        <p>Here are your pending workout invitations:</p>

        <div th:if="${#lists.isEmpty(invitations)}">
            <p>You do not have any workout invitations yet.</p>
        </div>

        <div th:if="${!#lists.isEmpty(invitations)}">
            <div th:each="invitation : ${invitations}" class="friend-card invitation-card">

                <div class="friend-card-content">
                    <div class="profile-pic">
                        <div class="profile-pic-initial" th:text="${invitation.sender.username.substring(0, 1).toUpperCase()}">S</div>
                    </div>
                    <div class="friend-card-info">
                        <h4 class="invitation-sender" th:text="${invitation.sender.username}">Sender username</h4>
                        <p th:text="${invitation.sender.email}">sender@example.com</p>

                        <p th:if="${invitation.workoutSession != null}">
                            <strong>Workout:</strong>
                            <span th:text="${invitation.workoutSession.sessionName}">Workout name</span>
                        </p>

                        <p class="request-status">
                            <span class="status-badge" th:text="${invitation.status}">PENDING</span>
                        </p>
                    </div>
                </div>

            </div>
        </div>

    </div>
</body>
</html>
