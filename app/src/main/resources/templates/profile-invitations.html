<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Workout Invitations</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .invitation-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--smoke);
            border: 1px solid var(--steel);
            margin-bottom: 12px;
            border-radius: 4px;
        }

        .invitation-card-content {
            display: flex;
            gap: 16px;
            flex: 1;
            align-items: center;
        }

        .invitation-card-info {
            flex: 1;
        }

        .invitation-card-info h4 {
            margin: 0 0 4px 0;
            color: var(--chalk);
            font-size: 16px;
        }

        .invitation-card-info p {
            margin: 4px 0;
            color: var(--chalk-dim);
            font-size: 14px;
        }

        .invitation-actions {
            display: flex;
            gap: 8px;
        }

        .invitation-actions button {
            padding: 8px 16px;
            border: 1px solid var(--steel);
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .accept-btn {
            background: var(--chalk);
            color: var(--smoke);
            border-color: var(--chalk);
        }

        .accept-btn:hover {
            background: var(--chalk-dim);
            border-color: var(--chalk-dim);
        }

        .decline-btn {
            background: transparent;
            color: var(--chalk);
            border-color: var(--steel);
        }

        .decline-btn:hover {
            background: var(--smoke);
            border-color: var(--chalk);
        }

        .profile-pic {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--steel);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--chalk);
            font-weight: 700;
            font-size: 18px;
            overflow: hidden;
        }

        .profile-pic-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tabs-container {
            display: flex;
            gap: 0;
            margin: 24px 0 16px 0;
            border-bottom: 1px solid var(--steel);
        }

        .tab-btn {
            padding: 12px 24px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            color: var(--chalk-dim);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            color: var(--chalk);
        }

        .tab-btn.active {
            color: var(--chalk);
            border-bottom-color: var(--rust);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="top-nav">
            <a th:href="@{/profile}" class="cta-button secondary no-decoration">Back to Profile</a>
        </div>

        <h1>Workout Invitations</h1>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('active')">Active Invites</button>
            <button class="tab-btn" onclick="switchTab('old')">Old Invites</button>
        </div>

        <!-- Active Tab -->
        <div id="activeTab" class="tab-content active">
            <div id="activeInvitationsContainer">
                <p style="color: var(--chalk-dim);">Loading invitations...</p>
            </div>
        </div>

        <!-- Old Tab -->
        <div id="oldTab" class="tab-content">
            <div id="oldInvitationsContainer">
                <p style="color: var(--chalk-dim);">Loading invitations...</p>
            </div>
        </div>

    </div>

    <script>
        let allInvitations = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await loadInvitations();
        });

        async function loadInvitations() {
            try {
                const response = await fetch('/api/workouts/pending-invitations');
                if (!response.ok) {
                    throw new Error('Failed to load invitations');
                }
                allInvitations = await response.json();
                renderInvitations();
                setupProfilePictures();
            } catch (error) {
                console.error('Error loading invitations:', error);
                document.getElementById('activeInvitationsContainer').innerHTML =
                    '<p style="color: var(--chalk-dim);">Failed to load invitations</p>';
            }
        }

        function renderInvitations() {
            const activeInvitations = allInvitations.filter(inv => inv.sessionStatus === 'LIVE');
            const oldInvitations = allInvitations.filter(inv => inv.sessionStatus !== 'LIVE');

            // Render active invitations
            const activeContainer = document.getElementById('activeInvitationsContainer');
            if (activeInvitations.length === 0) {
                activeContainer.innerHTML = '<p style="color: var(--chalk-dim);">You have no active workout invitations.</p>';
            } else {
                activeContainer.innerHTML = activeInvitations.map(invitation => createInvitationCard(invitation)).join('');
            }

            // Render old invitations
            const oldContainer = document.getElementById('oldInvitationsContainer');
            if (oldInvitations.length === 0) {
                oldContainer.innerHTML = '<p style="color: var(--chalk-dim);">You have no old workout invitations.</p>';
            } else {
                oldContainer.innerHTML = oldInvitations.map(invitation => createInvitationCard(invitation, true)).join('');
            }
        }

        function createInvitationCard(invitation, isOld = false) {
            const sessionDate = new Date(invitation.sessionDate).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            let actionsHtml = '';
            if (!isOld) {
                actionsHtml = `
                    <div class="invitation-actions">
                        <button class="accept-btn" onclick="acceptInvitation(${invitation.invitationId})">Accept</button>
                        <button class="decline-btn" onclick="declineInvitation(${invitation.invitationId})">Decline</button>
                    </div>
                `;
            } else {
                actionsHtml = `
                    <div class="invitation-actions">
                        <button class="decline-btn" onclick="declineInvitation(${invitation.invitationId})">Remove</button>
                    </div>
                `;
            }

            return `
                <div class="invitation-card">
                    <div class="invitation-card-content">
                        <div class="profile-pic">
                            <div class="profile-pic-initial">${invitation.senderUsername.substring(0, 1).toUpperCase()}</div>
                        </div>
                        <div class="invitation-card-info">
                            <h4 class="invitation-sender">${invitation.senderUsername}</h4>
                            <p><strong>${invitation.senderUsername} invited you to a workout</strong></p>
                            <p><strong>Workout:</strong> <span>${invitation.sessionName}</span></p>
                            <p><strong>Date:</strong> <span>${sessionDate}</span></p>
                            ${isOld ? `<p style="color: var(--chalk-dim); font-size: 12px;"><em>This workout is ${invitation.sessionStatus.toLowerCase()}</em></p>` : ''}
                        </div>
                    </div>
                    ${actionsHtml}
                </div>
            `;
        }

        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Update tab content
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        function setupProfilePictures() {
            document.querySelectorAll('.invitation-card').forEach(card => {
                const username = card.querySelector('.invitation-sender').textContent.trim();
                const profilePic = card.querySelector('.profile-pic');
                if (profilePic) {
                    loadProfilePicture(username, profilePic);
                }
            });
        }

        function loadProfilePicture(username, container) {
            fetch(`/profile/${encodeURIComponent(username)}/picture`)
                .then(res => res.ok ? res.text() : null)
                .then(base64 => {
                    if (base64 && base64.length > 0) {
                        setAvatarImage(base64, container);
                    }
                })
                .catch(err => console.error('Error loading profile picture:', err));
        }

        function setAvatarImage(base64, container) {
            const existingImg = container.querySelector('img');
            const initial = container.querySelector('.profile-pic-initial');

            if (existingImg) {
                existingImg.src = `data:image/jpeg;base64,${base64}`;
                existingImg.style.display = 'block';
            } else {
                const img = document.createElement('img');
                img.src = `data:image/jpeg;base64,${base64}`;
                img.alt = 'Profile picture';
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.className = 'profile-pic-img';
                container.appendChild(img);
            }

            if (initial) {
                initial.style.display = 'none';
            }
        }

        function acceptInvitation(invitationId) {
            const invitation = allInvitations.find(inv => inv.invitationId === invitationId);
            if (!invitation) return;

            if (invitation.sessionStatus !== 'LIVE') {
                alert('This workout session is no longer active and cannot be joined.');
                return;
            }

            if (!confirm('Accept this workout invitation?')) return;

            fetch(`/api/workouts/0/accept-invitation`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ invitationId: invitationId })
            })
            .then(res => res.ok ? res.json() : Promise.reject(res))
            .then(() => location.reload())
            .catch(err => alert('Failed to accept invitation: ' + err.message));
        }

        function declineInvitation(invitationId) {
            if (!confirm('Are you sure?')) return;

            fetch(`/api/invitations/${invitationId}/decline`, {
                method: 'POST'
            })
            .then(res => res.ok ? res.json() : Promise.reject(res))
            .then(() => location.reload())
            .catch(err => alert('Failed to decline invitation: ' + err.message));
        }
    </script>
</body>
</html>
