<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Leaderboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>Leaderboard 🏆</h1>
        <p class="subtitle">Top Lifts from the Community</p>

        <!-- Bench Press -->
        <div class="mb-3xl">
            <h3 class="text-primary">🏋️ Bench Press</h3>
            <div id="bench-list"></div>
        </div>

        <!-- Squat -->
        <div class="mb-3xl">
            <h3 class="text-primary">🦵 Squat</h3>
            <div id="squat-list"></div>
        </div>

        <!-- Deadlift -->
        <div class="mb-3xl">
            <h3 class="text-primary">💀 Deadlift</h3>
            <div id="deadlift-list"></div>
        </div>

        <div class="page-actions">
            <a th:href="@{/profile}" class="cta-button no-decoration">Back to Profile</a>
        </div>
    </div>

    <script>
        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const data = await res.json();

                renderList('bench-list', data.bench);
                renderList('squat-list', data.squat);
                renderList('deadlift-list', data.deadlift);

            } catch (err) {
                alert('Failed to load leaderboard');
            }
        }

        function renderList(elementId, list) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';

            if (!list || list.length === 0) {
                container.innerHTML = '<p class="text-muted">No data yet.</p>';
                return;
            }

            list.forEach((entry, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';

                div.innerHTML = `
                    <strong><span class="list-item-rank">#${index + 1}</span></strong>
                    Username: ${entry.username} &nbsp;|&nbsp; Weight: ${entry.weight} lbs &nbsp;|&nbsp; Reps: ${entry.reps}
                `;

                container.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', loadLeaderboard);
    </script>
</body>
</html>
