<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Your Fitness Companion</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>💪 GymBuddy</h1>
        <p class="subtitle">Your Personal Fitness Companion</p>

        <p>Welcome to GymBuddy! Track your workouts, achieve your fitness goals, and connect with fellow fitness enthusiasts.</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Track Progress</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <div class="feature-text">Set Goals</div>
            </div>
            <div class="feature">
                <div class="feature-icon">👥</div>
                <div class="feature-text">Connect Friends</div>
            </div>
        </div>

        <div>
            <button class="cta-button" id="get-started-btn">Get Started</button>
            <button class="cta-button secondary" id="learn-more-btn">Learn More</button>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
