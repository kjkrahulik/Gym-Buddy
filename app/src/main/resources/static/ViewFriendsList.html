<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Your Fitness Companion</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Friends List</h1>
    </header>
    <main>
        <section>
            <p>This is where the friends list will be displayed.</p>
            <!-- Show all friends -->
            <p>This is where the list of all friends will be displayed.</p>
            <!-- Search for a name in the list -->
            <input type="text" placeholder="Search for a friend...">
            <!-- Select a friend from the search results -->
            <select>
                <option value="">Select a friend</option>
            </select>
            <button>View Profile</button>
        
        </section>
    </main>
</body>
