<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymBuddy - Your Fitness Companion</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
    <div class="container">
        <h1>💪 GymBuddy</h1>
        <p class="subtitle">Your Personal Fitness Companion</p>

        <p>Welcome to GymBuddy! Track your workouts, achieve your fitness goals, and connect with fellow fitness enthusiasts.</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Track Progress</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎯</div>
                <div class="feature-text">Set Goals</div>
            </div>
            <div class="feature">
                <div class="feature-icon">👥</div>
                <div class="feature-text">Connect Friends</div>
            </div>
        </div>

        <div class="auth-links" style="margin-top: 30px; text-align: center;">
            <button id="login-btn" class="cta-button" style="text-decoration: none; margin-right: 10px;">Login</button>
            <button id="create-account-btn" class="cta-button" style="text-decoration: none;">Create Account</button>
        </div>
    </div>
    <script src="/js/main.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/navigation.js"></script>
</body>
</html>
